    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FAFAF8; --surface: #FFFFFF; --border: #E8E6E1;
      --text: #1A1917; --text-muted: #6B6860; --accent: #2563EB;
      --accent-soft: #EFF4FF; --tag-bg: #F3F2EF;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
      --shadow-hover: 0 4px 12px rgba(0,0,0,0.10), 0 16px 40px rgba(0,0,0,0.06);
      --radius: 12px;
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body: 'Outfit', system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-body); background: var(--bg); color: var(--text); line-height: 1.6; font-size: 16px; -webkit-font-smoothing: antialiased; }
    ::selection { background: var(--accent); color: white; }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(250,250,248,0.9); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); height: 60px; display: flex; align-items: center; }
    .nav-inner { max-width: 920px; width: 100%; margin: 0 auto; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; }
    .nav-logo { font-family: var(--font-display); font-size: 1.1rem; color: var(--text); text-decoration: none; }
    .nav-right { display: flex; align-items: center; gap: 24px; }
    .nav-links { display: flex; gap: 22px; list-style: none; }
    .nav-links a { font-size: 0.78rem; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }

    /* LANG TOGGLE */
    .lang-toggle { display: flex; background: var(--tag-bg); border: 1px solid var(--border); border-radius: 20px; padding: 3px; gap: 2px; }
    .lang-btn { font-size: 0.71rem; font-weight: 700; letter-spacing: 0.05em; padding: 4px 11px; border-radius: 16px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }
    .lang-btn.active { background: var(--surface); color: var(--accent); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .lang-btn:hover:not(.active) { color: var(--text); }

    /* FADE TRANSITION ON LANG SWITCH */
    .lang-wrap { transition: opacity 0.15s ease; }
    .lang-wrap.fading { opacity: 0; }

    main { padding-top: 60px; }
    section { max-width: 920px; margin: 0 auto; padding: 80px 24px; }

    /* HERO */
    #hero { padding-top: 100px; padding-bottom: 80px; min-height: 70vh; display: flex; flex-direction: column; justify-content: center; }
    .hero-eyebrow { display: inline-flex; align-items: center; gap: 8px; font-size: 0.79rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; opacity: 0; animation: fadeUp 0.6s 0.1s forwards; }
    .hero-eyebrow::before { content: ''; width: 24px; height: 1px; background: var(--accent); }
    h1.hero-name { font-family: var(--font-display); font-size: clamp(2.8rem, 6vw, 4.4rem); line-height: 1.08; letter-spacing: -0.02em; color: var(--text); margin-bottom: 8px; opacity: 0; animation: fadeUp 0.6s 0.2s forwards; }
    h1.hero-name em { font-style: italic; color: var(--accent); }
    .hero-title { font-size: clamp(0.95rem, 2vw, 1.1rem); color: var(--text-muted); font-weight: 400; margin-bottom: 28px; opacity: 0; animation: fadeUp 0.6s 0.3s forwards; }
    .hero-desc { font-size: 1.02rem; color: var(--text-muted); max-width: 560px; line-height: 1.78; margin-bottom: 36px; opacity: 0; animation: fadeUp 0.6s 0.4s forwards; }
    .hero-cta { display: flex; gap: 12px; flex-wrap: wrap; opacity: 0; animation: fadeUp 0.6s 0.5s forwards; }
    .btn { display: inline-flex; align-items: center; gap: 7px; padding: 11px 22px; border-radius: 8px; font-family: var(--font-body); font-size: 0.87rem; font-weight: 500; text-decoration: none; cursor: pointer; transition: all 0.2s; border: none; }
    .btn-primary { background: var(--text); color: white; }
    .btn-primary:hover { background: #333; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
    .btn-outline { background: transparent; color: var(--text); border: 1.5px solid var(--border); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
    .hero-meta { display: flex; gap: 24px; flex-wrap: wrap; margin-top: 48px; padding-top: 36px; border-top: 1px solid var(--border); opacity: 0; animation: fadeUp 0.6s 0.6s forwards; }
    .hero-meta-item { display: flex; flex-direction: column; gap: 2px; }
    .hero-meta-label { font-size: 0.7rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); font-weight: 500; }
    .hero-meta-value { font-size: 0.9rem; font-weight: 500; color: var(--text); }

    /* SECTION */
    .section-header { margin-bottom: 40px; }
    .section-label { display: inline-flex; align-items: center; gap: 8px; font-size: 0.74rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
    .section-label::before { content: ''; width: 16px; height: 1px; background: var(--accent); }
    h2.section-title { font-family: var(--font-display); font-size: clamp(1.8rem, 4vw, 2.4rem); letter-spacing: -0.02em; line-height: 1.15; color: var(--text); }

    /* ABOUT */
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start; }
    .about-text p { color: var(--text-muted); line-height: 1.82; font-size: 0.97rem; margin-bottom: 16px; }
    .about-facts { display: flex; flex-direction: column; gap: 14px; }
    .fact-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
    .fact-num { font-family: var(--font-display); font-size: 1.8rem; color: var(--text); line-height: 1; margin-bottom: 4px; }
    .fact-desc { font-size: 0.8rem; color: var(--text-muted); }

    /* TIMELINE */
    .timeline { display: flex; flex-direction: column; }
    .timeline-item { display: grid; grid-template-columns: 175px 1fr; gap: 32px; padding: 28px 0; border-bottom: 1px solid var(--border); }
    .timeline-item:last-child { border-bottom: none; }
    .timeline-period { font-size: 0.77rem; font-weight: 500; color: var(--text-muted); margin-bottom: 4px; }
    .timeline-company { font-size: 0.81rem; color: var(--accent); font-weight: 500; }
    .timeline-title { font-family: var(--font-display); font-size: 1.15rem; color: var(--text); margin-bottom: 8px; line-height: 1.3; }
    .timeline-location { font-size: 0.77rem; color: var(--text-muted); margin-bottom: 12px; }
    .timeline-bullets { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .timeline-bullets li { font-size: 0.87rem; color: var(--text-muted); padding-left: 14px; position: relative; line-height: 1.62; }
    .timeline-bullets li::before { content: '—'; position: absolute; left: 0; color: var(--accent); font-size: 0.75rem; }

    /* PROJECTS */
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(275px, 1fr)); gap: 16px; }
    .project-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; transition: box-shadow 0.25s, transform 0.25s, border-color 0.25s; display: flex; flex-direction: column; }
    .project-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); border-color: #d0ccc5; }
    .project-card.featured { grid-column: span 2; background: var(--accent-soft); border-color: #BFCFED; }
    @media (max-width: 680px) { .project-card.featured { grid-column: span 1; } }
    .project-tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .tech-tag { font-size: 0.69rem; font-weight: 500; padding: 3px 9px; border-radius: 20px; background: var(--tag-bg); color: var(--text-muted); border: 1px solid var(--border); }
    .project-card.featured .tech-tag { background: white; border-color: #BFCFED; color: var(--accent); }
    .project-date { font-size: 0.71rem; letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
    .project-name { font-family: var(--font-display); font-size: 1.12rem; color: var(--text); margin-bottom: 10px; line-height: 1.25; }
    .project-desc { font-size: 0.84rem; color: var(--text-muted); line-height: 1.68; flex: 1; margin-bottom: 18px; }

    /* PROJECT FOOTER — GitHub + Demo buttons */
    .project-footer { display: flex; gap: 8px; flex-wrap: wrap; margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }
    .project-card.featured .project-footer { border-color: #BFCFED; }
    .proj-link {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.73rem; font-weight: 600; letter-spacing: 0.02em;
      padding: 5px 13px; border-radius: 6px;
      text-decoration: none; transition: all 0.18s;
      border: 1.5px solid var(--border);
      color: var(--text-muted); background: var(--surface);
    }
    .proj-link:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); transform: translateY(-1px); }
    .project-card.featured .proj-link { background: white; border-color: #BFCFED; color: var(--accent); }
    .project-card.featured .proj-link:hover { background: var(--accent); color: white; border-color: var(--accent); }
    .proj-link.private { opacity: 0.38; pointer-events: none; }

    /* SKILLS */
    .skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(255px, 1fr)); gap: 16px; }
    .skill-group { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px 24px; }
    .skill-group-label { display: flex; align-items: center; gap: 10px; font-size: 0.74rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; }
    .skill-pills { display: flex; flex-wrap: wrap; gap: 7px; }
    .skill-pill { font-size: 0.79rem; padding: 4px 12px; border-radius: 20px; background: var(--tag-bg); color: var(--text); border: 1px solid var(--border); }

    /* EDUCATION */
    .edu-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    @media (max-width: 700px) { .edu-grid { grid-template-columns: 1fr; } }
    .edu-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; transition: box-shadow 0.2s, transform 0.2s; }
    .edu-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
    .edu-year { font-size: 0.71rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent); font-weight: 600; margin-bottom: 10px; }
    .edu-school { font-family: var(--font-display); font-size: 1.02rem; color: var(--text); margin-bottom: 6px; line-height: 1.3; }
    .edu-degree { font-size: 0.81rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 10px; }
    .edu-badge { display: inline-block; font-size: 0.73rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: var(--accent-soft); color: var(--accent); border: 1px solid #BFCFED; margin-right: 6px; margin-bottom: 4px; }
    .edu-badge.muted { background: var(--tag-bg); color: var(--text-muted); border-color: var(--border); }

    /* CERTS */
    .cert-card { display: flex; align-items: center; gap: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 22px; margin-bottom: 12px; transition: box-shadow 0.2s; }
    .cert-card:hover { box-shadow: var(--shadow); }
    .cert-icon { width: 40px; height: 40px; border-radius: 8px; background: var(--accent-soft); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
    .cert-name { font-weight: 500; font-size: 0.91rem; color: var(--text); margin-bottom: 3px; }
    .cert-issuer { font-size: 0.77rem; color: var(--text-muted); }

    /* RECS */
    .recs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 640px) { .recs-grid { grid-template-columns: 1fr; } }
    .rec-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
    .rec-quote { font-size: 0.87rem; color: var(--text-muted); line-height: 1.78; margin-bottom: 18px; font-style: italic; }
    .rec-quote::before { content: '"'; font-family: var(--font-display); font-size: 2.8rem; color: var(--accent); line-height: 0.5; display: block; margin-bottom: 12px; opacity: 0.45; }
    .rec-author { display: flex; align-items: center; gap: 12px; }
    .rec-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent-soft); display: flex; align-items: center; justify-content: center; font-size: 0.78rem; font-weight: 600; color: var(--accent); flex-shrink: 0; }
    .rec-name { font-size: 0.84rem; font-weight: 600; color: var(--text); }
    .rec-role { font-size: 0.75rem; color: var(--text-muted); }
    .rec-notice { font-size: 0.74rem; color: var(--text-muted); text-align: center; padding: 11px; background: #FFF9EC; border: 1px dashed #E8D98A; border-radius: 8px; margin-bottom: 20px; }

    /* CONTACT */
    #contact { padding-bottom: 100px; }
    .contact-inner { background: var(--text); border-radius: 16px; padding: 48px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; }
    @media (max-width: 640px) { .contact-inner { grid-template-columns: 1fr; padding: 32px 24px; } }
    .contact-heading { font-family: var(--font-display); font-size: clamp(1.8rem, 3vw, 2.4rem); color: white; line-height: 1.15; margin-bottom: 12px; }
    .contact-sub { font-size: 0.91rem; color: rgba(255,255,255,0.58); line-height: 1.72; }
    .contact-links { display: flex; flex-direction: column; gap: 12px; }
    .contact-link { display: flex; align-items: center; gap: 14px; padding: 14px 18px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; color: white; text-decoration: none; font-size: 0.87rem; transition: all 0.2s; }
    .contact-link:hover { background: rgba(255,255,255,0.12); transform: translateX(4px); }
    .contact-link-icon { font-size: 1rem; opacity: 0.65; }

    /* FOOTER */
    footer { text-align: center; padding: 28px 24px; font-size: 0.77rem; color: var(--text-muted); border-top: 1px solid var(--border); }

    /* DIVIDER */
    .divider { max-width: 920px; margin: 0 auto; padding: 0 24px; border: none; border-top: 1px solid var(--border); }

    /* SCROLL FADE */
    .fade-in { opacity: 0; transform: translateY(16px); transition: opacity 0.5s ease, transform 0.5s ease; }
    .fade-in.visible { opacity: 1; transform: translateY(0); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }

    @media (max-width: 540px) { .nav-links { display: none; } }
  </style>
</head>

/* ── FADE-IN HOOK ───────────────────────────────────── */
function useFadeIn() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    el.classList.add("fade-in");
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { el.classList.add("visible"); obs.disconnect(); } }, { threshold: 0.1 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return ref;
}

/* ── SECTION WRAPPER ────────────────────────────────── */
function Sec({ id, label, title, children }) {
  const ref = useFadeIn();
  return (
    <section id={id}>
      <div className="section-header" ref={ref}>
        <div className="section-label">{label}</div>
        <h2 className="section-title">{title}</h2>
      </div>
      {children}
    </section>
  );
}

/* ── PROJECT CARD ───────────────────────────────────── */
function ProjCard({ p, t }) {
  const ref = useFadeIn();
  return (
    <div className={`project-card${p.featured?" featured":""}`} ref={ref}>
      <div className="project-tag-row">{p.stack.map(s=><span className="tech-tag" key={s}>{s}</span>)}</div>
      <div className="project-date">{p.date}</div>
      <div className="project-name">{p.name}</div>
      <p className="project-desc">{p.desc}</p>
      <div className="project-footer">
        {p.github
          ? <a className="proj-link" href={p.github} target="_blank" rel="noopener">⌥ {t.ghBtn}</a>
          : <span className="proj-link private">🔒 {t.privateBtn}</span>
        }
        {p.demo && <a className="proj-link" href={p.demo} target="_blank" rel="noopener">↗ {t.demoBtn}</a>}
      </div>
    </div>
  );
}
